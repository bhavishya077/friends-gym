services:
  - type: web
    name: friends-gym-app
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ALLOWED_ORIGIN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    disk:
      name: friends-gym-data
      mountPath: /var/data
      sizeGB: 1
