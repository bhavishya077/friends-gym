name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'scripts/build-mobile.mjs'
      - 'capacitor.config.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'index.html'
      - 'style.css'
      - 'script.js'
      - 'assets/**'
      - 'icons/**'

permissions:
  contents: write

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install pnpm
        run: npm install --global pnpm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Android project
        run: pnpm mobile:build

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: friends-gym-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish latest test APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk Friends-Gym-test.apk
          gh release delete android-latest --cleanup-tag --yes || true
          gh release create android-latest Friends-Gym-test.apk \
            --target "${GITHUB_SHA}" \
            --title "Friends Gym Android Test APK" \
            --notes "Installable Android test build. This debug APK is for direct phone testing, not Play Store production." \
            --prerelease